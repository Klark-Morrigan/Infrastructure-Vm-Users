# Lint-support shim. This repo's Ansible implementation is nested under
# hyper-v/ubuntu/Ansible/ (the by-impl repo layout), but the fleet-wide
# ansible-lint CI action only activates when ansible.cfg / playbooks/ /
# roles/ exist at the repo ROOT, and it lints with --project-dir = repo
# root. This file exists so that:
#   1. ansible-lint does not auto-skip this repo's Ansible content, and
#   2. include_role by short name (groups, users, sudoers, vm_users_entry)
#      resolves to the nested roles/ during the lint pass.
#
# It is NOT used at runtime: the Ansible flow runs through the Common-Ansible
# substrate bridge, which cd's to the SUBSTRATE root and uses the substrate's
# own ansible.cfg. This shim only affects ansible/ansible-lint invoked from
# this repo's root (i.e. the CI lint pass).
[defaults]
roles_path = hyper-v/ubuntu/Ansible/roles
