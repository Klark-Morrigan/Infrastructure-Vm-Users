---
# Role metadata. galaxy_info present only to satisfy ansible-lint's
# role-name / meta-no-info rules; this is a repo-internal helper, not
# a Galaxy-published role.

galaxy_info:
  role_name: vm_users_entry
  author: Common-Ansible
  description: >-
    Resolve the VmUsersConfig entry for the current host into the
    shared `vm_users_entry` fact. Consumed via meta dependency by
    roles/groups, roles/users, and roles/sudoers; replaces the
    per-role selectattr+set_fact each of those roles carried before.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - users

# No dependencies of its own; this role is the bottom of the chain.
dependencies: []
