---
# Role metadata. Same shape as the sibling roles' meta files: the
# galaxy_info block is here to satisfy ansible-lint, not to publish.

galaxy_info:
  role_name: sudoers
  author: Common-Ansible
  description: >-
    Reconcile /etc/sudoers.d/<username> drop-ins on a target VM from
    each user's sudoersRules array in the VmUsersConfig vault entry.
    Third role in the create-users play; runs after roles/users so the
    account each drop-in references already exists.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - users
    - sudoers

# Only dependency: the vm_users_entry helper, which sets the shared
# `vm_users_entry` fact this role's loop reads.
#
# `roles/users` is intentionally NOT a meta-dep here even though the
# write direction needs the account to exist before a drop-in references
# it. Ansible's meta dependencies ALWAYS run `tasks/main.yml`; they
# ignore the entry-role's `tasks_from` selector. So declaring
# `- role: users` here would silently re-run `users/main.yml` (the
# create direction) every time `remove-users.yml` imports
# `sudoers` with `tasks_from: remove` - resurrecting the accounts the
# operator just asked to delete moments before `sudoers/remove.yml`
# wipes their drop-ins. Ordering is owned by the playbook instead:
# `create-users.yml` explicitly lists groups -> users -> sudoers, and
# `remove-users.yml` explicitly lists sudoers -> users -> groups
# (reverse). Standalone `--tags sudoers` runs no longer auto-pull the
# create dep - that mode is operator-driven and the partial-removal
# tags work is explicitly deferred (see plan.md, resolved open
# question #3).
dependencies:
  - role: vm_users_entry
