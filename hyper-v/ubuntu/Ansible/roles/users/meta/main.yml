---
# Role metadata. Same shape as roles/groups/meta/main.yml: galaxy_info
# is present to satisfy ansible-lint's role-name / meta-no-info rules,
# not to publish to Galaxy.

galaxy_info:
  role_name: users
  author: Common-Ansible
  description: >-
    Reconcile declared OS users on a target VM from the VmUsersConfig
    vault entry for the host. Runs after roles/groups so any primary
    or supplementary group referenced by a user already exists.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions:
        - noble
  galaxy_tags:
    - system
    - users

# Only dependency: the vm_users_entry helper, which sets the shared
# `vm_users_entry` fact this role's loop reads.
#
# `roles/groups` is intentionally NOT a meta-dep here. The write
# direction does need declared groups to exist before
# ansible.builtin.user assigns them, but Ansible's meta dependencies
# ALWAYS run `tasks/main.yml` and ignore the entry-role's `tasks_from`
# selector - so `- role: groups` here would silently re-run
# `groups/main.yml` (the create direction) every time
# `remove-users.yml` imports `users` with `tasks_from: remove`,
# resurrecting groups during teardown. Ordering is owned by the
# playbook: `create-users.yml` lists groups -> users -> sudoers, and
# `remove-users.yml` lists sudoers -> users -> groups. Standalone
# `--tags users` runs no longer auto-pull groups - that mode is
# operator-driven and the partial-removal tags work is explicitly
# deferred (plan.md resolved open question #3).
dependencies:
  - role: vm_users_entry
