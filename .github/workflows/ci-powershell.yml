name: ci-powershell

# Delegates to the shared PowerShell CI workflow in Common-PowerShell.
# Kept as a local file so the pull_request trigger works for this repo,
# and so other workflows can call it via workflow_call.
on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-powershell:
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell.yml@master
