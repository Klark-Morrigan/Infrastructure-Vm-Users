name: Infrastructure-E2E

# Calls the shared E2E workflow in Infrastructure-E2E as a required PR check.
# Always runs the full lifecycle layer - a users change can cascade to break
# runner registration, so the full stack must be verified.
#
# Pins all three layers to ansible so this repo's PR exercises the full Ansible
# stack - its own users flow (create-users.sh / remove-users.sh on the
# Common-Ansible substrate), plus the runner and toolchain flows the full
# lifecycle cascades into. The toolchain flow runs provision-toolchains.sh
# against the Common-Ansible jdk / dotnet_sdk / dotnet_tools roles. The ansible
# flows need WslDistro in the E2EConfig vault. This pin does not cover the
# PowerShell create-users.ps1 / remove-users.ps1 path - use an explicit override
# or a matrix for that.
on:
  pull_request:

jobs:
  e2e:
    uses: Klark-Morrigan/Infrastructure-E2E/.github/workflows/e2e.yml@master
    secrets: inherit
    with:
      flow-spec: '{"usersFlow":"ansible","runnersFlow":"ansible","toolchainsFlow":"ansible"}'
